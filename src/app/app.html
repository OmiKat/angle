<app-header/>
<main>
  <ul id="users">
    <!-- ngfor is used in previous versions of anngular (A17 below) -->
    @for(user of users; track user.id){
    <li>
      <app-user
      [user] = "user"
      [selected]="user.id === selectedUserId"
      (select)="onSelectUser($event)"
      />
    </li>
  }
  </ul>
    @if(SelectedUser){
      <app-task [name]="SelectedUser.name" [id]="SelectedUser.id"></app-task>
    }@else {
      <p id="fallback">Select a User to see their Task :)</p>
    }
</main>
