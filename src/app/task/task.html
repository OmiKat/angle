@if(isAddingTask){
  <app-new-task [id]="id" (Cancle)="onCancelAddTask()" (add)="onAddTask($event)" />
}


<section id="tasks">
  <header>
    <h2> {{name}}'s Tasks</h2>
    <menu>
      <button (click)="onStartAddTask()">Add Task</button>
    </menu>
  </header>


  <ul>
    @for(task of selectedUserTask; track task.id){
      <li>
        <app-usertasks [task] = "task" (complete)="onComplete($event)" />
      </li>
    }

  </ul>
</section>
